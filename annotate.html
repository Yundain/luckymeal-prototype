<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>럭키밀 — 개발 핸드오프</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    /* ── Supabase Dark tokens ── */
    :root {
      --bg-canvas: #111111;
      --bg-primary: #171717;
      --bg-secondary: #1e1e1e;
      --bg-tertiary: #262626;
      --bg-surface: #2a2a2a;
      --bg-hover: #303030;
      --text-primary: #ededed;
      --text-secondary: #d0d0d0;
      --text-muted: #999999;
      --border-default: #333333;
      --border-strong: #444444;
      --border-muted: #2a2a2a;
      --border-subtle: #222222;
      --accent: #3ecf8e;
      --accent-light: rgba(62,207,142,0.12);
      --danger: #ef4444;
      --warning: #f59e0b;
      --radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-canvas); height: 100vh; overflow: hidden; color: var(--text-primary);
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    .container { display: flex; height: 100vh; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ── 프리뷰 영역 ── */
    .phone-area {
      width: 415px; min-width: 415px;
      display: flex; flex-direction: column; align-items: stretch;
      background: var(--bg-canvas); border-right: 1px solid var(--border-default);
    }
    .phone-wrap { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; }
    .phone-frame { width: 375px; height: 812px; border-radius: 20px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4); background: var(--bg-primary); }
    .phone-frame iframe { width: 100%; height: 100%; border: none; }
    .hl-box { position: absolute; pointer-events: none; z-index: 10; border: 2.5px solid var(--accent); border-radius: var(--radius); background: rgba(62,207,142,0.1); transition: all 0.2s; opacity: 0; }
    .hl-box.visible { opacity: 1; }

    /* ── 오른쪽 컬럼 ── */
    .right-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .ann { flex: 2; overflow-y: auto; padding: 16px 20px; background: var(--bg-primary); min-height: 0; }

    /* ── 플로우맵 패널 ── */
    .flow-panel { flex: 1; min-height: 120px; border-top: 1px solid var(--border-default); background: var(--bg-secondary); display: flex; flex-direction: column; position: relative; }
    .flow-panel-bar {
      height: 32px; min-height: 32px; background: var(--bg-primary); border-bottom: 1px solid var(--border-default);
      display: flex; align-items: center; padding: 0 12px; gap: 8px; cursor: ns-resize; user-select: none;
    }
    .flow-panel-bar::before { content: ''; width: 32px; height: 3px; border-radius: 2px; background: var(--border-strong); position: absolute; left: 50%; transform: translateX(-50%); }
    .flow-panel-title { font-size: 12px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.3px; text-transform: uppercase; }
    .flow-panel-link { margin-left: auto; font-size: 11px; color: var(--text-muted); text-decoration: none; font-weight: 500; }
    .flow-panel-link:hover { color: var(--text-primary); text-decoration: underline; }
    .flow-panel-canvas-wrap { flex: 1; overflow: hidden; position: relative; cursor: grab; }
    .flow-panel-canvas-wrap.grabbing { cursor: grabbing; }
    .flow-panel-canvas { position: absolute; top: 0; left: 0; width: 2700px; height: 600px; transform-origin: 0 0; }
    .flow-panel-canvas svg.fp-edges { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; shape-rendering: geometricPrecision; }
    .flow-panel-canvas .fp-node {
      position: absolute; border-radius: var(--radius); display: flex; align-items: center; justify-content: center;
      text-align: center; font-size: 11px; font-weight: 500; cursor: pointer;
      transition: box-shadow 0.15s, border-color 0.15s; user-select: none; z-index: 2;
      -webkit-font-smoothing: subpixel-antialiased; text-rendering: geometricPrecision;
    }
    .flow-panel-canvas .fp-node:hover { box-shadow: 0 1px 3px 0 rgba(0,0,0,0.3), 0 1px 2px -1px rgba(0,0,0,0.2); }
    .fp-main { width: 120px; height: 40px; background: var(--bg-tertiary); border: 1px solid var(--border-strong); color: var(--text-primary); box-shadow: 0 1px 2px 0 rgba(0,0,0,0.2); }
    .fp-sheet { width: 100px; height: 34px; background: var(--bg-tertiary); border: 1.5px dashed var(--border-strong); color: var(--text-secondary); font-size: 9px; }
    .fp-grey { width: 100px; height: 34px; background: var(--bg-secondary); border: 1px solid var(--border-default); color: var(--text-muted); font-size: 9px; cursor: default; }
    .fp-end { width: 120px; height: 40px; background: var(--text-primary); border: 1px solid var(--text-primary); color: var(--bg-canvas); }
    .fp-current { border-color: var(--accent) !important; box-shadow: 0 0 0 3px rgba(62,207,142,0.25) !important; }
    .fp-edge-label { position: absolute; font-size: 9px; color: var(--text-muted); white-space: nowrap; pointer-events: none; z-index: 1; text-rendering: geometricPrecision; }
    .fp-badge { position: absolute; top: -6px; right: -6px; min-width: 26px; height: 14px; border-radius: 7px; font-size: 8px; font-weight: 600; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
    .fp-badge.complete { background: rgba(62,207,142,0.15); color: var(--accent); }
    .fp-badge.partial { background: rgba(245,158,11,0.15); color: var(--warning); }

    /* ── 프레임 상단 제목 바 ── */
    .screen-title-bar {
      padding: 16px 20px 12px; background: var(--bg-primary);
      border-bottom: 1px solid var(--border-default);
    }
    .screen-title-bar .title-row { display: flex; align-items: flex-start; gap: 8px; }
    .screen-title-bar .title-text { flex: 1; min-width: 0; }
    .screen-title-bar h1 { font-size: 17px; font-weight: 600; color: var(--text-primary); margin: 0 0 2px; letter-spacing: -0.01em; }
    .screen-title-bar .desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin: 0; }
    .screen-title-bar .badge { margin-bottom: 6px; }
    .screen-title-bar .title-actions { display: flex; gap: 4px; flex-shrink: 0; margin-top: 2px; }
    .title-action-btn {
      border: 1px solid var(--border-default); background: var(--bg-tertiary); color: var(--text-muted);
      font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 6px;
      cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap;
    }
    .title-action-btn:hover { color: var(--text-primary); border-color: var(--border-strong); background: var(--bg-surface); }
    .title-action-btn.copied { color: var(--accent); border-color: var(--accent); }

    /* ── 최근 수정 뱃지 ── */
    .updated-badge {
      display: inline-flex; align-items: center; gap: 4px; position: relative;
      font-size: 11px; color: var(--text-muted); white-space: nowrap; margin-right: 8px;
      cursor: default;
    }
    .updated-badge svg { width: 12px; height: 12px; flex-shrink: 0; opacity: 0.6; }
    .updated-badge .badge-tip {
      display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      margin-top: 6px; padding: 4px 8px; border-radius: 6px;
      background: var(--bg-surface); color: var(--text-secondary); border: 1px solid var(--border-default);
      font-size: 11px; white-space: nowrap; z-index: 20; pointer-events: none;
    }
    .updated-badge:hover .badge-tip { display: block; }

    /* ── 어노테이션 타이틀 (숨김 — 상단바로 이동) ── */
    .ann h1 { display: none; }
    .ann .desc { display: none; }
    .ann .badge { display: none; }

    /* ── 뱃지 ── */
    .badge {
      display: inline-flex; align-items: center; height: 24px;
      padding: 0 10px; border-radius: 6px;
      font-size: 12px; font-weight: 500; margin-bottom: 8px;
      border: 1px solid transparent;
    }
    .badge-step { background: var(--text-primary); color: var(--bg-canvas); }
    .badge-us { background: var(--bg-surface); color: var(--text-secondary); margin-left: 4px; border-color: var(--border-strong); }

    /* ── 케이스 버튼 ── */
    .cases { margin-bottom: 20px; }
    .cases-title { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.3px; text-transform: uppercase; }
    .case-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .case-btn {
      height: 30px; padding: 0 12px;
      border-radius: 6px; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s; border: 1px solid var(--border-default);
      background: var(--bg-tertiary); color: var(--text-primary);
      font-family: inherit; display: inline-flex; align-items: center;
    }
    .case-btn.done:hover { background: var(--bg-surface); }
    .case-btn.done.active { background: var(--accent); border-color: var(--accent); color: var(--bg-canvas); }
    .case-btn.todo { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.25); color: #f87171; }
    .case-btn.todo::before { content: '○ '; }

    /* ── 섹션 타이틀 ── */
    .section-title { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; margin-top: 20px; letter-spacing: 0.3px; text-transform: uppercase; }

    /* ── 영역 카드 ── */
    .area-card {
      border: none; border-radius: 0; margin-bottom: 4px;
      overflow: hidden; transition: all 0.15s;
    }
    .area-card[data-area-sel] { cursor: pointer; }
    .area-card.hl-active { box-shadow: inset 3px 0 0 var(--accent); }
    .area-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 4px; background: transparent;
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      letter-spacing: 0.3px; text-transform: uppercase;
      border-bottom: none; transition: background 0.15s;
    }
    .area-header[data-sel] { cursor: pointer; }
    .area-header[data-sel]:hover { color: var(--accent); }
    .area-header::before {
      content: ''; width: 3px; height: 12px; border-radius: 2px; background: var(--accent); flex-shrink: 0;
    }
    .area-header .area-hl-icon {
      margin-left: auto; opacity: 0; transition: opacity 0.15s;
      color: var(--accent); font-size: 12px; font-weight: 500;
    }
    .area-header[data-sel] .area-hl-icon { opacity: 0.4; }
    .area-header[data-sel]:hover .area-hl-icon { opacity: 1; }
    .area-cases { display: flex; flex-wrap: wrap; gap: 5px; padding: 4px 4px 8px; }
    .area-body { padding: 0; }
    .area-body .spec {
      border-radius: 0; background: transparent; margin-bottom: 0;
      padding: 8px 4px 8px 12px; border: none; border-bottom: 1px solid var(--border-muted);
    }
    .area-body .spec:last-child { border-bottom: none; }

    /* ── 독립 스펙 카드 ── */
    .spec {
      border-radius: var(--radius); padding: 10px 12px; margin-bottom: 6px;
      font-size: 14px; line-height: 1.65; color: var(--text-secondary);
      background: transparent; position: relative; transition: all 0.15s;
      border: 1px solid var(--border-muted);
    }
    .spec[data-sel] { cursor: pointer; }
    .spec[data-sel]:hover { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(62,207,142,0.3); }
    .spec .dot { display: none; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); position: absolute; left: -10px; top: 16px; }
    .spec[data-sel] .dot { display: block; }
    .spec strong { color: var(--text-primary); }
    .spec code {
      background: rgba(255,255,255,0.1); padding: 1px 5px; border-radius: 4px;
      font-size: 12px; font-family: 'SF Mono', 'Fira Code', monospace; color: var(--text-primary);
    }
    .hl {
      background: rgba(62,207,142,0.15); color: var(--accent);
      padding: 1px 6px; border-radius: 4px; font-weight: 600; font-size: 12px;
    }

    /* ── 카테고리 태그 ── */
    .cat {
      font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px;
      margin-right: 4px; vertical-align: 1px; border: 1px solid transparent;
    }
    .cat-motion { background: rgba(88,166,255,0.15); color: #79b8ff; border-color: rgba(88,166,255,0.25); }
    .cat-state { background: rgba(245,158,11,0.15); color: #ffca5f; border-color: rgba(245,158,11,0.25); }
    .cat-case { background: rgba(224,144,208,0.15); color: #f0b0e0; border-color: rgba(224,144,208,0.25); }
    .cat-api { background: rgba(163,113,247,0.15); color: #c4a5fb; border-color: rgba(163,113,247,0.25); }
    .cat-todo { background: rgba(239,68,68,0.12); color: #f87171; border-color: rgba(239,68,68,0.25); }

    /* ── 테이블 ── */
    .case-table { width: 100%; border-collapse: collapse; margin: 8px 0 2px; font-size: 13px; border: 1px solid var(--border-default); border-radius: 6px; overflow: hidden; }
    .case-table th { background: var(--bg-surface); text-align: left; padding: 6px 10px; font-weight: 500; color: var(--text-secondary); border-bottom: 1px solid var(--border-default); }
    .case-table td { padding: 6px 10px; border-bottom: 1px solid var(--border-default); color: var(--text-secondary); vertical-align: top; }
    .case-table tr:last-child td { border-bottom: none; }
    .case-table td:first-child { font-weight: 500; color: var(--text-primary); white-space: nowrap; }

    /* ── 코드 블록 (접기/복사) ── */
    .code-wrap { margin: 8px 0 2px; }
    .code-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px; color: var(--text-muted); font-weight: 500; }
    .code-toggle:hover { color: var(--text-primary); }
    .code-toggle svg { transition: transform 0.2s; }
    .code-toggle.open svg { transform: rotate(90deg); }
    .code-body { display: none; margin-top: 6px; position: relative; }
    .code-body.open { display: block; }
    .code-body pre { margin: 0; padding: 12px 14px; background: var(--bg-canvas); color: var(--text-primary); border-radius: var(--radius); font-size: 12px; line-height: 1.6; overflow-x: auto; white-space: pre; border: 1px solid var(--border-default); }
    .code-copy { position: absolute; top: 6px; right: 6px; padding: 4px 10px; background: var(--bg-surface); color: var(--text-secondary); border: none; border-radius: 4px; font-size: 12px; font-weight: 500; cursor: pointer; }
    .code-copy:hover { background: var(--bg-hover); color: var(--text-primary); }
    .code-copy.copied { background: rgba(62,207,142,0.3); color: var(--accent); }

    /* ── 결정 근거 ── */
    .why-toggle { display: flex; align-items: center; gap: 6px; padding: 8px 0; cursor: pointer; font-size: 13px; color: var(--text-muted); margin-top: 12px; font-weight: 500; }
    .why-toggle:hover { color: var(--text-primary); }
    .why-toggle svg { transition: transform 0.2s; }
    .why-toggle.open svg { transform: rotate(90deg); }
    .why-content {
      display: none; padding: 12px 14px;
      background: var(--bg-tertiary); border: 1px solid var(--border-default); border-radius: var(--radius);
      margin-top: 6px; margin-bottom: 8px; font-size: 13px; line-height: 1.65; color: var(--text-secondary);
    }
    .why-content.open { display: block; }
    hr { border: none; border-top: 1px solid var(--border-default); margin: 16px 0; }

    /* ── 채팅 피드백 ── */
    .chat-section { margin-top: 24px; }
    .chat-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .chat-title { font-size: 12px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.3px; text-transform: uppercase; }
    .chat-list { display: flex; flex-direction: column; gap: 2px; margin-bottom: 12px; }
    .chat-empty { font-size: 13px; color: var(--text-muted); text-align: center; padding: 24px 0; }

    /* 말풍선 공통 */
    .chat-bubble-wrap { display: flex; flex-direction: column; padding: 4px 0; }
    .chat-bubble-wrap.me { align-items: flex-start; }
    .chat-bubble-wrap.other { align-items: flex-start; }
    .chat-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; padding: 0 2px; }
    .chat-author { font-size: 11px; font-weight: 600; color: var(--text-secondary); }
    .chat-time { font-size: 10px; color: var(--text-muted); }
    .chat-bubble {
      max-width: 85%; padding: 8px 12px; border-radius: 12px;
      font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
      position: relative;
    }
    .chat-bubble-wrap.other .chat-bubble {
      background: var(--bg-tertiary); color: var(--text-primary);
      border-top-left-radius: 4px;
    }
    .chat-bubble-wrap.me .chat-bubble {
      background: rgba(62,207,142,0.15); color: var(--text-primary);
      border-top-left-radius: 4px;
    }

    /* 말풍선 hover 액션 */
    .chat-actions {
      display: none; align-items: center; gap: 2px; margin-top: 2px; padding: 0 2px;
    }
    .chat-bubble-wrap:hover .chat-actions { display: flex; }
    .chat-action-btn {
      border: none; background: none; color: var(--text-muted); cursor: pointer;
      font-size: 11px; font-weight: 500; padding: 2px 6px; border-radius: 4px;
      font-family: inherit; transition: all 0.1s;
    }
    .chat-action-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
    .chat-action-btn.danger:hover { color: var(--danger); background: rgba(239,68,68,0.1); }

    /* 해결 뱃지 */
    .chat-resolved-badge {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 10px; font-weight: 600; color: var(--accent);
      background: rgba(62,207,142,0.1); padding: 1px 6px; border-radius: 4px;
      margin-left: 6px;
    }

    /* 스레드 답글 */
    .chat-thread { margin-left: 24px; padding-left: 12px; border-left: 2px solid var(--border-default); }
    .chat-thread .chat-bubble-wrap { padding: 2px 0; }
    .chat-thread .chat-bubble { font-size: 13px; }

    /* 답글 입력 (인라인) */
    .chat-reply-form {
      margin-left: 24px; padding-left: 12px; border-left: 2px solid var(--accent);
      margin-top: 4px; display: flex; gap: 6px; align-items: flex-end;
    }
    .chat-reply-input {
      flex: 1; padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border-default);
      font-size: 13px; font-family: inherit; outline: none; resize: none; min-height: 32px; max-height: 80px;
      background: var(--bg-tertiary); color: var(--text-primary); transition: border-color 0.15s;
    }
    .chat-reply-input:focus { border-color: var(--accent); }
    .chat-reply-send {
      height: 32px; padding: 0 12px; border-radius: 8px; border: none;
      background: var(--accent); color: var(--bg-canvas);
      font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit;
      white-space: nowrap; transition: opacity 0.15s;
    }
    .chat-reply-send:hover { opacity: 0.9; }
    .chat-reply-cancel {
      height: 32px; padding: 0 8px; border-radius: 8px; border: 1px solid var(--border-default);
      background: transparent; color: var(--text-muted);
      font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .chat-reply-cancel:hover { color: var(--text-primary); border-color: var(--border-strong); }

    /* 하단 고정 입력폼 */
    .chat-form {
      border-top: 1px solid var(--border-default); padding: 10px 20px 12px;
      background: var(--bg-primary); display: flex; gap: 8px; align-items: flex-end;
    }
    .chat-input-name {
      width: 64px; height: 34px; padding: 0 8px; border-radius: 8px; border: 1px solid var(--border-default);
      font-size: 12px; font-family: inherit; outline: none; background: var(--bg-tertiary);
      color: var(--text-primary); transition: border-color 0.15s;
      flex-shrink: 0;
    }
    .chat-input-name:focus { border-color: var(--accent); }
    .chat-input-text {
      flex: 1; padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border-default);
      font-size: 13px; font-family: inherit; outline: none; resize: none; min-height: 34px; max-height: 100px;
      background: var(--bg-tertiary); color: var(--text-primary); transition: border-color 0.15s;
    }
    .chat-input-text:focus { border-color: var(--accent); }
    .chat-submit {
      height: 34px; width: 34px; border-radius: 8px; border: none; flex-shrink: 0;
      background: var(--accent); color: var(--bg-canvas); cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: opacity 0.15s;
    }
    .chat-submit:hover { opacity: 0.9; }
    .chat-submit:disabled { opacity: 0.3; cursor: not-allowed; }
    .chat-submit svg { width: 16px; height: 16px; }

    /* 피드백 플래시 하이라이트 */
    .chat-bubble-wrap.chat-flash .chat-bubble {
      animation: chat-flash-anim 1.5s ease-out;
    }
    @keyframes chat-flash-anim {
      0% { box-shadow: 0 0 0 3px rgba(62,207,142,0.5); }
      100% { box-shadow: 0 0 0 0px rgba(62,207,142,0); }
    }

    /* ── 패널 탭 바 ── */
    .panel-tabs {
      position: sticky; top: 0; z-index: 8; background: var(--bg-primary);
      display: flex; align-items: center;
      border-bottom: 1px solid var(--border-default);
      padding: 0; gap: 0; height: 40px;
    }
    .panel-tab {
      position: relative;
      padding: 0 20px; height: 100%;
      display: inline-flex; align-items: center;
      font-size: 14px; font-weight: 500; color: var(--text-muted);
      cursor: pointer; border: none; background: none; font-family: inherit;
      transition: color 0.15s;
    }
    .panel-tab:hover { color: var(--text-primary); }
    .panel-tab.active { color: var(--text-primary); }
    .panel-tab.active::after {
      content: ''; position: absolute; bottom: -1px; left: 20px; right: 20px;
      height: 2px; background: var(--accent); border-radius: 1px;
    }
    .panel-tab .tab-count {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 20px; height: 20px; padding: 0 6px;
      border-radius: 10px; font-size: 11px; font-weight: 600; margin-left: 6px;
    }
    .panel-tab .tab-count.warn { background: rgba(239,68,68,0.15); color: var(--danger); }

    /* ── 키보드 토글 ── */
    .kb-toggle { margin-right: 12px; display: flex; align-items: center; gap: 6px; cursor: pointer; border: none; background: none; font-family: inherit; }
    .kb-toggle-track { width: 32px; height: 18px; border-radius: 9px; background: var(--bg-surface); position: relative; transition: background 0.2s; }
    .kb-toggle-track.on { background: var(--accent); }
    .kb-toggle-thumb { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 7px; background: var(--text-primary); transition: transform 0.2s; }
    .kb-toggle-track.on .kb-toggle-thumb { transform: translateX(14px); }
    .kb-toggle-label { font-size: 12px; font-weight: 500; color: var(--text-muted); white-space: nowrap; }

    /* ── ann 레이아웃: 스펙 스크롤 + 하단 입력 고정 ── */
    .ann-wrap { flex: 1; display: flex; flex-direction: column; min-height: 0; }

    /* 모바일: 프로토타입만 표시 */
    @media (max-width: 768px) {

      }
      .phone-wrap { width: 100%; height: 100%; }
      .right-col { display: none; }
      .screen-title-bar { display: none; }
    }

    // ── 상대 시간 ──
    function getRelativeTime(date){
      const now=new Date(), diff=now-date;
      const mins=Math.floor(diff/60000);
      const hrs=Math.floor(diff/3600000);
      const d=Math.floor(diff/86400000);
      if(mins<1) return '방금';
      if(mins<60) return `${mins}분 전`;
      if(hrs<48) return `${hrs}시간 전`;
      if(d<7) return `${d}일 전`;
      if(d<30) return `${Math.floor(d/7)}주 전`;
      if(d<365) return `${Math.floor(d/30)}개월 전`;
      return `${Math.floor(d/365)}년 전`;
    }
    function formatDateTime(date){
      const y=date.getFullYear(), m=String(date.getMonth()+1).padStart(2,'0'), dd=String(date.getDate()).padStart(2,'0');
      const h=String(date.getHours()).padStart(2,'0'), mi=String(date.getMinutes()).padStart(2,'0');
      return `${y}-${m}-${dd} ${h}:${mi}`;
    }

    // ── 스크린 → 마크다운 변환 ──
    function screenToMd(sc){
      const strip=t=>(t||'').replace(/<[^>]*>/g,'').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&');
      let md=`## ${sc.label} ${sc.title}\n`;
      if(sc.us) md+=`> ${sc.us}\n`;
      md+=`\n${strip(sc.desc)}\n`;
      if(sc.nav){
        md+='\n### 플로우\n';
        if(sc.nav.from.length) md+=sc.nav.from.map(n=>`- ← ${n.label}${n.condition?' ('+n.condition+')':''}`).join('\n')+'\n';
        if(sc.nav.to.length) md+=sc.nav.to.map(n=>`- → ${n.label}${n.condition?' ('+n.condition+')':''}`).join('\n')+'\n';
      }
      if(sc.cases&&sc.cases.length){
        md+='\n### 케이스\n';
        sc.cases.forEach(c=>{ md+=`- [${c.status==='done'?'x':' '}] ${c.label}\n`; });
      }
      if(sc.specs&&sc.specs.length){
        md+='\n### 스펙\n';
        let area='';
        sc.specs.forEach(s=>{
          if(s.area&&s.area!==area){ area=s.area; md+=`\n**${area}**\n`; }
          const cat=CAT[s.cat]?CAT[s.cat][0]:s.cat;
          md+=`- [${cat}] ${strip(s.text)}\n`;
          if(s.cases) s.cases.forEach(c=>{ md+=`  - [${c.status==='done'?'x':' '}] ${c.label}\n`; });
          if(s.codeBlock) md+=`  \`\`\`json\n  ${s.codeBlock.code}\n  \`\`\`\n`;
        });
      }
      if(sc.why) md+=`\n### 의사결정 배경\n${strip(sc.why)}\n`;
      return md;
    }

    // ── 피드백 저장소 (feedback.json via Vite API) ──
    let _fbCache = null;
    async function loadFeedback(){
      try{ const r=await fetch('/api/feedback'); _fbCache=await r.json(); }catch(e){ _fbCache={}; }
      // 마이그레이션: 기존 reply(string) → replies 배열
      for(const items of Object.values(_fbCache)){
        if(!Array.isArray(items))continue;
        items.forEach(fb=>{
          if(fb.reply && !fb.replies){ fb.replies=[{author:'Claude',text:fb.reply,ts:fb.ts}]; fb.resolved=true; }
          if(!fb.replies) fb.replies=[];
          if(fb.resolved===undefined) fb.resolved=!!fb.reply;
          delete fb.reply;
        });
      }
      return _fbCache;
    }
    function getAllFeedback(){ return _fbCache||{}; }
    async function saveFeedback(all){ _fbCache=all; try{await fetch('/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(all,null,2)});}catch(e){} }
    function getFeedback(screenId){ return getAllFeedback()[screenId]||[]; }
    async function addFeedback(screenId,fb){ const all=getAllFeedback(); if(!all[screenId])all[screenId]=[]; all[screenId].push(fb); await saveFeedback(all); }
    async function deleteFeedback(screenId,idx){ const all=getAllFeedback(); if(all[screenId]){all[screenId].splice(idx,1); await saveFeedback(all);} }
    async function addReply(screenId,idx,reply){ const all=getAllFeedback(); if(all[screenId]&&all[screenId][idx]){ if(!all[screenId][idx].replies)all[screenId][idx].replies=[]; all[screenId][idx].replies.push(reply); await saveFeedback(all); } }
    async function toggleResolved(screenId,idx){ const all=getAllFeedback(); if(all[screenId]&&all[screenId][idx]){ all[screenId][idx].resolved=!all[screenId][idx].resolved; await saveFeedback(all); } }

        let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
        FP_NODES.forEach(n=>{
          const nd=nMap[n.id]; if(!nd)return;
          minX=Math.min(minX,nd.x); minY=Math.min(minY,nd.y);
          maxX=Math.max(maxX,nd.x+nd.w); maxY=Math.max(maxY,nd.y+nd.h);
        });
        const pad=30;
        const bw=maxX-minX+pad*2, bh=maxY-minY+pad*2;
        const rect=fpWrap.getBoundingClientRect();
        if(rect.width===0||rect.height===0)return;
        fpScale=Math.min(rect.width/bw, rect.height/bh, 1.2);
        fpPanX=(rect.width - bw*fpScale)/2 - (minX-pad)*fpScale;
        fpPanY=(rect.height - bh*fpScale)/2 - (minY-pad)*fpScale;
        fpApply();
      }
      requestAnimationFrame(()=>requestAnimationFrame(fpFitView));

      window.fpHighlight = function(nodeId){
        Object.values(nodeEls).forEach(el=>el.classList.remove('fp-current'));
        if(nodeEls[nodeId]) nodeEls[nodeId].classList.add('fp-current');
        // 현재 노드 중심으로 팬
        const n=nMap[nodeId]; if(!n)return;
        const rect=fpWrap.getBoundingClientRect();
        const cx=n.x+n.w/2, cy=n.y+n.h/2;
        fpPanX = rect.width/2 - cx*fpScale;
        fpPanY = rect.height/2 - cy*fpScale;
        fpApply();
      };

      // 휠: 상하(deltaY) = 줌, 좌우(deltaX) = 패닝
      fpWrap.addEventListener('wheel', e=>{
        e.preventDefault();
        if(Math.abs(e.deltaX)>Math.abs(e.deltaY)){
          // 좌우 스와이프 → 패닝
          fpPanX-=e.deltaX;
          fpApply();
        } else {
          // 상하 스크롤 / 핀치 → 줌
          const rect=fpWrap.getBoundingClientRect();
          const mx=e.clientX-rect.left, my=e.clientY-rect.top;
          const prev=fpScale;
          const delta = -e.deltaY * 0.005;
          fpScale=Math.min(FP_MAX,Math.max(FP_MIN,fpScale*(1+delta)));
          fpPanX=mx-(mx-fpPanX)*(fpScale/prev);
          fpPanY=my-(my-fpPanY)*(fpScale/prev);
          fpApply();
        }
      },{passive:false});

      // 드래그 팬
      let fpDrag=false,fpDX,fpDY,fpPX,fpPY;
      fpWrap.addEventListener('mousedown',e=>{
        if(e.target.closest('.fp-node'))return;
        fpDrag=true;fpWrap.classList.add('grabbing');
        fpDX=e.clientX;fpDY=e.clientY;fpPX=fpPanX;fpPY=fpPanY;e.preventDefault();
      });
      window.addEventListener('mousemove',e=>{
        if(!fpDrag)return;
        fpPanX=fpPX+(e.clientX-fpDX);fpPanY=fpPY+(e.clientY-fpDY);fpApply();
      });
      window.addEventListener('mouseup',()=>{if(fpDrag){fpDrag=false;fpWrap.classList.remove('grabbing');}});

      // 패널 리사이즈
      const fpPanel=document.getElementById('flowPanel');
      const fpBar=document.getElementById('fpBar');
      let resizing=false,resizeStartY,resizeStartH;
      fpBar.addEventListener('mousedown',e=>{
        if(e.target.closest('.flow-panel-link'))return;
        resizing=true;resizeStartY=e.clientY;resizeStartH=fpPanel.offsetHeight;
        document.body.style.cursor='ns-resize';document.body.style.userSelect='none';e.preventDefault();
      });
      window.addEventListener('mousemove',e=>{
        if(!resizing)return;
        const newH=Math.max(80,resizeStartH-(e.clientY-resizeStartY));
        fpPanel.style.height=newH+'px';
      });
      window.addEventListener('mouseup',()=>{
        if(resizing){resizing=false;document.body.style.cursor='';document.body.style.userSelect='';}
      });

      // 초기: 첫 화면 노드 중심
      setTimeout(()=>{
        fpScale=0.35;
        fpHighlight(S[startIdx].id);
      },100);
    })();
  </script>
</body>
</html>
